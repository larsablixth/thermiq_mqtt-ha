[mypy]
python_version = 3.14
files = custom_components, tests
# custom_components has no __init__.py (HA convention); anchor module
# names at the repo root so files are not found under two names
explicit_package_bases = True
# Home Assistant and its deps are installed in the test env, but many
# transitive libs ship no stubs
ignore_missing_imports = True
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = True

# Don't type-check Home Assistant's own source (it targets a newer Python
# syntax level than this config); treat its API surface as Any
[mypy-homeassistant.*]
follow_imports = skip
